<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic</title>
</head>

<body>
    <script>

        // difference between var, let and const :- 
        // var:- var is function scoped, it can be re-declared and updated, it is hoisted to the top of the function.
        // let:- let is block scoped, it can be updated but not re-declared,
        // const:- const is block scoped, it cannot be updated or re-declared, it must be initialized at the time of declaration.


        // Q1. Ek variable name banao aur usme apna naam store karke console me print karo.

        var name = "Aakash"
        console.log(name);

        // Q2. Do variables a = 10 aur b = 20 banao aur unka sum print karo

        let a = 10;
        let b = 20;
        let sum = a + b;
        console.log(sum);

        // Q3. Ek variable age banao aur console me print karo:

        let age = 22;
        console.log(`My age is ${age}`);

        // Q4. Niche diye gaye code ka output batao:

        let x = 5;
        let y = "5";

        console.log(x == y);  // true
        console.log(x === y); // false

        // Q5. User se naam lo aur alert me print karo:

        let user = prompt("What is your name ")
        alert("Hello Aakash")


    </script>
</body>

</html>
