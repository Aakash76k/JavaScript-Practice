<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conditions</title>
</head>
<body>
    <script>

        // conditions:- Conditions are used to perform different actions based on different conditions. In JavaScript, we use if, else if and else statements to perform conditional operations.

        // Level 2: If-Else

       //  Q1. let age = 20; Agar age 18 ya usse zyada hai to print karo: You can vote warna: You cannot vote

       let age = 20;
       if(age >= 18){
            console.log("you can vote");
       }else{
        console.log("you can not vote");
       }

      // Q2. let num = 7; Check karo number even hai ya odd.

      let num1 = 7;
      if(num1%2==0){
        console.log("Even");
      }else{
        console.log("odd");
      }

      // Q3. let marks = 85; Agar marks 40 ya usse zyada hain to: Pass warna: Fail

      let marks1 = 85;
      if(marks1>=40){
        console.log("pass");
      }else{
        console.log("fail");
      }

      // Q4. let num = -5; Check karo: Positive , Negative, Zero

      let number = -5;
      if(number>0){
        console.log("Positive");
      }else if(number<0){
        console.log("Negative");
      }else {
        console.log("Zero");
      }

      // Q5. user se "yes" ya "no" input lo. Output: You are good ya You are not good

      let user = prompt("please enter yes or no")
      if(user === "yes"){
        console.log("You are good");
      }else if(user === "no"){
        console.log("You are not good");
      }
     
     // Q6 Grade System let marks = 75; Output: 90+ → A ,80+ → B,70+ → C,60+ → D,Below 60 → F

     let marks = 75;
     if(marks>= 90){
      console.log("Grade A");
     }else if(marks>=80){
      console.log("Grade B");
     }else if(marks>=70){
      console.log("Grade C");
     }else if(marks>=60){
      console.log("Grade D");
     }else{
      console.log("Grade F");
     }

     
     // Q7 Largest Number let a = 10; let b = 20; Print: b is greater

     let a = 10;
     let b = 20;
     if(a>b){
      console.log("a is greater");
     }else{
      console.log("b is greater");
     }
     


     // Q8 Divisible Check let num = 15; Check karo number 3 aur 5 dono se divisible hai ya nahi. Expected: Divisible by both

     let num = 15;
     if(num%3 == 0 && num%5==0){
      console.log("Divisible by both");
     }else{
      console.log("Not Divisible");
     }

     // Q9 Login System let username = "admin"; let password = "1234"; Agar username aur password dono sahi hain: Login Successful warna: Invalid Credentials

     let username = "admin";
     let password = "1234";

     if(username == "admin" && password == "1234"){
        console.log("Login Successful");
     }else{
      console.log("Invalid Credential");
     }

     // Q10 Leap Year (Thoda sochna 😁) let year = 2024; Output: Leap Year ya Not a Leap Year
     let year = 2024;
     if(year%4 == 0){
      console.log("Leap Year");
     }else{
      console.log("Not a Leap Year");
     }

    </script>
</body>
</html>
