        // Q14 find sum of even numbers

        let d = [10, 25, 30, 45, 50, 15]

                sum2 += d[i];
            }
        }
        console.log(sum2);

        // Q15 find sum of odd number 

        let e = [10, 25, 30, 45, 50, 15]

                sum3 += e[i]
            }
        }

        // Q16 Question 1: Array ko reverse print karo

        let array = [10, 25, 30, 45, 50, 15]

            console.log(array[i]);
        }

        // Q16: Array me ek number search karo

        let a1 = [10, 25, 30, 45, 50, 15]
        let find = 45;
        for (let i = 0; i <= a1.length; i++) {
            if (a1[i] == find) {
                console.log("number found");
            }
        }

        //  Q17: Array me duplicate values count karo

        let a2 = [10, 20, 10, 30, 20, 10];

        for (let i = 0; i < a2.length; i++) {

            let isDuplicate = false;

            // Check if current value already appeared before
            for (let k = 0; k < i; k++) {
                if (a2[i] === a2[k]) {
                    isDuplicate = true;
                    break;
                }
            }

            if (isDuplicate) {
                continue;
            }

            let count = 0;

            // Count occurrences
            for (let j = 0; j < a2.length; j++) {
                if (a2[i] === a2[j]) {
                    count++;
                }
            }

            console.log(a2[i] + " => " + count);
        }


        // 1. Array ko Ascending Order me sort karo (without sort())

        let a3 = [30,10,50,20]
        for(let i=0; i<a3.length; i++){
            for(let j = i+1; j<a3.length; j++){
                if(a3[i]>a3[j]){
                    let swap = a3[i];
                    a3[i] = a3[j];
                    a3[j] = swap;
                }
            }
            
        }
        console.log(a3);

        // 2. Array ko Descending Order me sort karo

        for(let i=0; i<a4.length; i++){

                if(a4[i]>a4[j]){
                    let s = a4[i];
                    a4[i] = a4[j];
                    a4[j] = s  
                }
            }
        }
