<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array</title>
</head>
<body>
    <script>

        // Q1 print array using index 

        let colors =["Red", "Green", "Yellow"]
        console.log(colors[0]);
        console.log(colors[1]);
        console.log(colors[2]);

        // Q2 print last number

        let number = [10, 20,30,40,50]
        console.log(number[4]);

        // Q3 Print array length 

        let cities = ["delhi", "mumbai","pune","jaipur"]
        console.log(cities.length);

        // Q4 Array ko update karo Banana ko Orange se replace karo aur poora array print karo

        let fruits = ["Apple", "Banana","Mango"]
        fruits[1] = "orange"
        console.log(fruits);

        // Q5 Add element mango

        let fruits1 =["Apple","Banana"]
        fruits1.push("mango");
        console.log(fruits1);

        // Q6 Remove last element

        let fruits2=["Apple","Mango","Banana "]
        fruits2.pop();
        console.log(fruits2);

        //print all colors using loops

        let colors1 =["red","blue","green","yellow","orange"]
        for(let i =0; i<colors1.length; i++){
            console.log(colors1[i]);
        }

    </script>
</body>
</html>
