<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String Questions</title>
</head>

<body>
    <script>

        //  String:- Jo bhi text ya characters double quotes " " ya single quotes ' ' ke andar likhe hote hain, usse String kehte hain.
        //  String immutable hoti hai (directly change nahi hoti)

        //Q1. String ke saare characters print karo

        let str = "Aakash";
        for (let i = 0; i < str.length; i++) {
            console.log(str[i]);
        }

        //Q2. String ki length count karo

        let str1 = "Aakash";
        console.log(str.length);

        // Q3. String reverse karo

        let str2 = "Aakash";
        let rev = "";
        for (let i = str2.length - 1; i >= 0; i--) {
            rev += str2[i]
        }
        console.log(rev);

        // Q4. Vowels count karo

        let str3 = "Aakash";
        let count = 0;
        str3 = str3.toUpperCase()

        for (let i = 0; i < str3.length; i++) {
            if (
                str3[i] == "A" ||
                str3[i] == "E" ||
                str3[i] == "I" ||
                str3[i] == "O" ||
                str3[i] == "U"

            ) {
                count++;
            }
        }
        console.log(count);

        //Q5. Consonants count karo

        let str4 = "Aakash";
        let count1 = 0;
        str4 = str4.toUpperCase();

        for (let i = 0; i < str4.length; i++) {
            if (
                str4[i] != "A" &&
                str4[i] != "E" &&
                str4[i] != "I" &&
                str4[i] != "O" &&
                str4[i] != "U"
            )
            {
                count1++;
            }
        }
        console.log(count1);

        //Q6. Uppercase letters count karo

        let str5 = "AaKaSh";
        let count2 = 0;
        for(let i=0; i<str5.length; i++){
            if(str5[i] >= "A" && str5[i] <= "Z"){
                count2++;
            }
        }
        console.log(count2);



    </script>
</body>
