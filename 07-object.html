<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Object</title>
  </head>
  <body>
    <script>
      // Object :- Object ek container hota hai jo related information ko "key : value" pair me store karta hai.
      // Jaise:

      //   let mobile = {
      //       brand: "Samsung",
      //       model: "S25",
      //       price: 80000
      //   };

      //   Yahan

      //   brand → Samsung

      //   model → S25

      //   price → 80000

      // Examples:-

      //  Q1. Student Object banao

      let student = {
        name: "Aakash",
        age: 23,
        course: "Btech",
      };

      // Q2. Object ki values print karo

      console.log(student.name);
      console.log(student.age);
      console.log(student.course);

      // Q3. Age update karo

      let student1 = {
        name: "pawan",
        age: 22,
        course: "bca",
      };

      student1.age = 23;
      console.log(student1);

      // Q4. New Property add karo

      let student2 = {
        name: "shivam",
        age: 22,
        course: "mtech",
      };
      student2.city = "Delhi";
      console.log(student2);

      // Q5. Property delete karo

      let student3 = {
        name: "shivam",
        age: 22,
        course: "mtech",
        city: "Delhi",
      };
      delete student3.course;
      console.log(student3);

      //Q6. Car Object

      let car = {
        brand: "BMW",
        model: "X5",
        price: 9000000,
        color: "Black",
      };
      console.log(car.brand);
      console.log(car.model);
      console.log(car.price);
      console.log(car.color);

      // Q7. Mobile Object

      let mobile = {
        brand: "Apple",
        model: "iPhone 16",
        storage: "256GB",
        price: 120000,
      };
      console.log(mobile.brand);
      console.log(mobile.price);

      // Loops in objects

      // Q8 Property Count

      let student4 = {
        name: "pawan",
        age: 24,
        city: "Delhi",
        course: "BCA",
      };
      let count1 = 0;
      for (let key in student4) {
        count1++;
      }
      console.log(count1);

      // Q9 Print Keys

      let student5 = {
        name: "Aakash",
        age: 22,
        city: "Delhi",
      };

      for (let key in student5) {
        console.log(key);
      }

      // Q10 Print Values

      for (let key in student5) {
        console.log(student5[key]);
      }

      // Q11 Print Keys and Values

      let student6 = {
        name: "Aakash",
        age: 22,
        city: "Delhi",
      };

      for (let key in student6) {
        console.log(key + " : " + student6[key]);
      }

      //

      // Array of Objects

      // Q1

      let students = [
        {
          name: "Aakash",
          age: 22,
        },
        {
          name: "Pawan",
          age: 24,
        },
      ];

      console.log(students[0].name);
      console.log(students[1].name);

      // Q2

      console.log(students[0].age);
      console.log(students[1].age);

      // Q3

      for (let key in students) {
        console.log(students[key].name + "-" + students[key].age);
      }

      // Q4

      for (let i = 0; i < students.length; i++) {
        console.log(students[i].name);
      }

      // Q5

   let students1 = [
        {
          name: "Aakash",
          age: 22,
          city: "Delhi"
        },
        {
          name: "Pawan",
          age: 24,
          city: "Mumbai"
        },
      ]; 
       for (let key in students1) {
        console.log(students1[key].name + "-" + students1[key].age + "-" + students1[key].city);
      }     

    </script>
  </body>
</html>
