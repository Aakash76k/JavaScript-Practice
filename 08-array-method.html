<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Array-method</title>
  </head>
  <body>
    <script>
      // push ➜ Last me add, pop ➜ Last se remove, unshift ➜ First me add, shift ➜ First se remove.

      // Q1 add 40

      let a = [10, 20, 30];
      a.push(40);
      console.log(a);

      // Q2 Remove last element

      let a1 = [10, 20, 30];
      a1.pop();
      console.log(a1);

      // Q3 add 10 in start

      let add = [20, 30];
      add.unshift(10);
      console.log(add);

      // Q4 Remove first element

      let remove = [10, 20, 30];
      remove.shift();
      console.log(remove);

      // Q5

      let a2 = [20, 30];
      a2.unshift(10);
      a2.push(40);
      console.log(a2);

      // Slice and splice :- slice - Copy karta hai, Original safe rehta hai. || splice -> 👇Cut karta hai , Original change ho jata hai., , arr.splice(start, deleteCount, newElement);

      // Q1

      let arr = [10, 20, 30, 40, 50];
      let ans = arr.slice(1, 4);
      console.log(ans);

      // Q2

      arr.splice(1, 2);
      console.log(arr);

      // Q3

      let ans2 = arr.slice(1, 3);
      console.log(ans2);

      // Q4 Delete

      let arr2 = [10, 20, 30, 40, 50];

      arr2.splice(3, 1);
      console.log(arr2);

      // Insert
      let arr3 = [10, 20, 30, 40, 50];

      arr3.splice(2, 0, 99);
      console.log(arr3);

      // Replace
      let arr4 = [10, 20, 30, 40];

      arr4.splice(1, 1, 50);
      console.log(arr4);

      // indexOf(), includes(), join(), concat()

      // Q1 indexof()

      let arr5 = [10, 20, 30, 40];
      console.log(arr5.indexOf(30));

      //Q2

      let arr6 = [10, 20, 30, 40];
      console.log(arr6.indexOf(50));

      //Q3 Includesof()

      let arr7 = [10, 20, 30, 40];
      console.log(arr7.includes(20));

      // Q4

      let arr8 = [10, 20, 30, 40];
      console.log(arr8.includes(100));

      // Q5 Join()

      let arr9 = ["HTML", "CSS", "JS"];
      console.log(arr9.join("-"));

      // Q6 Concat

      let arr11 = [10, 20];
      let arr22 = [30, 40];
      console.log(arr11.concat(arr22));

      // map : api se aya hua data screen pr dikhane k kaam krta h || Simple language me:- Array ke har element par ek kaam karta hai aur ek naya array return karta hai

      let arr111 = [10, 20, 30];

      let ans112 = arr111.map((item) => {
        return item * 2;
      });

      console.log(ans112);

      // Q1

      let ar1 = [1, 2, 3, 4];
      let an1 = ar1.map((item) => {
        return item * 2;
      });
      console.log(an1);

      //Q2

      let ar2 = [10, 20, 30];
      let an2 = ar2.map((item) => {
        return item + 5;
      });
      console.log(an2);

      // Q3

      let names = ["Aakash", "Pawan", "Shivam"];

      let an3 = names.map((item) => {
        return "Hello " + item;
      });
      console.log(an3);

      //Q4

      let ar4 = [10, 20, 30, 40];
      let an4 = ar4.map((item) => {
        return item * 10;
      });
      console.log(an4);

      //Q5

      let name = ["Aakash", "Pawan", "Shivam"];
      let an5 = name.map((item) => {
        return item.toUpperCase();
      });
      console.log(an5);

      //Q6

      let ar6 = [1, 2, 3, 4, 5];
      let an6 = ar6.map((item) => {
        return item.toString();
      });
      console.log(an6);

      // filter:- Sirf condition wale elements return karta hai,	Array chhota ya same ho sakta hai

      let a11 = [10, 20, 30, 40, 50];

      let a22 = a11.filter((item) => {
        return item > 25;
      });

      console.log(a22);

      // Q1

      let a12 = [10, 20, 30, 40, 50];
      let a13 = a12.filter((item) => {
        return item > 30;
      });
      console.log(a13);

      // Q2

      let a14 = [1, 2, 3, 4, 5, 6];
      let a15 = a14.filter((item) => {
        if (item % 2 == 0) {
          return item;
        }
      });
      console.log(a15);

      // Q3

      let n = ["Aakash", "Ram", "Pawan", "Om"];
      let n1 = n.filter((item) => {
        return item.length > 4;
      });
      console.log(n1);

      // Reduce:- Saare elements ko mila kar ek hi value return karta hai.

      // syntax:- arr.reduce((accumulator, item) => {    return ...}, initialValue);

      let a111 = [10, 20, 30];

      let an111 = a111.reduce((acc, item) => {
        return acc + item;
      }, 0);

      console.log(an111);

      // Q1

      
    </script>
  </body>
</html>
