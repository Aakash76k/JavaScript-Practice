<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array-method</title>
</head>
<body>
    <script>
    // push ➜ Last me add, pop ➜ Last se remove, unshift ➜ First me add, shift ➜ First se remove 
    
    // Q1 add 40 

    let a = [10,20,30]
    a.push(40);
    console.log(a)

    // Q2 Remove last element

    let a1 =[10,20,30]
    a1.pop();
    console.log(a1);

    // Q3 add 10 in start

    let add = [20,30]
    add.unshift(10);
    console.log(add);

    // Q4 Remove first element

    let remove = [10,20,30]
    remove.shift();
    console.log(remove);

    // Q5 

    let a2 = [20,30]
    a2.unshift(10);
    a2.push(40);
    console.log(a2);

    // Slice and splice :- slice - Copy karta hai, Original safe rehta hai. || splice -> 👇Cut karta hai , Original change ho jata hai.

    // Q1 

    let arr = [10,20,30,40,50];
    let ans = arr.slice(1,4);
    console.log(ans);

    // Q2 

    arr.splice(1,2);
    console.log(arr);

    // Q3

    let ans2 = arr.slice(1,3);
    console.log(ans2);

    // Q4

    let arr2 = [10,20,30,40,50]

    arr2.splice(3,1);
    console.log(arr2);

    </script>
</body>
</html>
