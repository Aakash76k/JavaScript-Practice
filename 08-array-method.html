<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Array-method</title>
  </head>
  <body>
    <script>
      // push ➜ Last me add, pop ➜ Last se remove, unshift ➜ First me add, shift ➜ First se remove.

      // Q1 add 40

      let a = [10, 20, 30];
      a.push(40);
      console.log(a);

      // Q2 Remove last element

      let a1 = [10, 20, 30];
      a1.pop();
      console.log(a1);

      // Q3 add 10 in start

      let add = [20, 30];
      add.unshift(10);
      console.log(add);

      // Q4 Remove first element

      let remove = [10, 20, 30];
      remove.shift();
      console.log(remove);

      // Q5

      let a2 = [20, 30];
      a2.unshift(10);
      a2.push(40);
      console.log(a2);

      // Slice and splice :- slice - Copy karta hai, Original safe rehta hai. || splice -> 👇Cut karta hai , Original change ho jata hai., , arr.splice(start, deleteCount, newElement);

      // Q1

      let arr = [10, 20, 30, 40, 50];
      let ans = arr.slice(1, 4);
      console.log(ans);

      // Q2

      arr.splice(1, 2);
      console.log(arr);

      // Q3

      let ans2 = arr.slice(1, 3);
      console.log(ans2);

      // Q4 Delete

      let arr2 = [10, 20, 30, 40, 50];

      arr2.splice(3, 1);
      console.log(arr2);

      // Insert
      let arr3 = [10, 20, 30, 40, 50];

      arr3.splice(2, 0, 99);
      console.log(arr3);

      // Replace
      let arr4 = [10, 20, 30, 40];

      arr4.splice(1, 1, 50);
      console.log(arr4);

      // indexOf(), includes(), join(), concat()

      // Q1 indexof()

      let arr5 = [10, 20, 30, 40];
      console.log(arr5.indexOf(30));

      //Q2

      let arr6 = [10, 20, 30, 40];
      console.log(arr6.indexOf(50));

      //Q3 Includesof()

      let arr7 = [10, 20, 30, 40];
      console.log(arr7.includes(20));

      // Q4

      let arr8 = [10, 20, 30, 40];
      console.log(arr8.includes(100));

      // Q5 Join()

      let arr9 = ["HTML", "CSS", "JS"];
      console.log(arr9.join("-"));

      // Q6 Concat

      let arr11 = [10, 20];
      let arr22 = [30, 40];
      console.log(arr11.concat(arr22));

      // map : api se aya hua data screen pr dikhane k kaam krta h

      let arr111 = [10, 20, 30];

      let ans112 = arr111.map((item) => {
        return item * 2;
      });

      console.log(ans112);

      // filter
    </script>
  </body>
</html>
