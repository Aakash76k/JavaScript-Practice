<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ES6</title>
  </head>
  <body>
    <script>
      //Destructuring:- Object ya Array se values ko direct variables me nikalna.

      let student = {
        name: "Aakash",
        age: 24,
        city: "Delhi",
      };

      let { name, age, city } = student;

      console.log(name);
      console.log(age);
      console.log(city);

      //Q1. Name print karo

      let student1 = {
        name1: "Aakash",
        age: 24,
      };
      let { name1 } = student1;

      console.log(name1);

      //Q2. Name aur Age print karo

      let s = {
        name2: "Aakash",
        age2: 23,
        city: "faridabad",
      };

      let { name2, age2 } = s;
      console.log(name2);
      console.log(age2);

      //Q3. Array Destructuring

      let ar = [10, 20, 30];

      let [a, b, c] = ar;
      console.log(a);
      console.log(b);
      console.log(c);

      //Q4. First aur Second Fruit

      let fruits = ["Apple", "Mango", "Banana"];

      let [u, v, w] = fruits;
      console.log(u);
      console.log(v);
      console.log(w);

      // Q5. Skip Value

      let numbers = [10, 20, 30, 40];

      let [a1, , c1] = numbers;
      console.log(a1);
      console.log(c1);

      // spread operator (...) :- Ek array ya object ko "phaila" dena (spread kar dena).

      // Q1 Copy Array
      let arr1 = [10, 20, 30];
      let arr2 = [...arr1];
      console.log(arr2);

      // Q2 Add New Elements

      let arr3 = [10, 20, 30];
      let arr4 = [...arr3, 40, 50];
      console.log(arr4);

      //Q3 Start me Add

      let arr5 = [30, 40];
      let arr6 = [10, 20, ...arr5];
      console.log(arr6);

      // Q4 Merge Two Arrays

      let arr7 = [10, 20];
      let arr8 = [30, 40];
      let arr9 = [...arr7, ...arr8];
      console.log(arr9);

      // Q5 Object Copy

      let student2 = {
        name: "Aakash",
        age: 24,
      };

      let student3 = {
        ...student2,
      };
      console.log(student3);

      // Rest Operator :- collect krta h .(...Rest Operator)

      //Q1

      function show(...number) {
        return number;
      }
      console.log(show(10, 20, 30));

      //Q2 Function banao jo jitne bhi numbers mile unka sum return kare.

      function sum(...number) {
        let total = 0;
        for (let i = 0; i < number.length; i++) {
          total += number[i];
        }
        return total;
      }
      console.log(sum(10, 20, 30));

      // Q3

      function demo(a, b, ...rest) {
        console.log(a);
        console.log(b);
        console.log(rest);
      }
      demo(10, 20, 30, 40, 50);

      // Q4 Function banao jo saare names print kare.

      function names1(...rest) {
        for (let i = 0; i < rest.length; i++) {
          console.log(rest[i]);
        }
      }

      names1("Aakash", "Shivam", "Mayank");

      // Template Literals :- ${} ke andar variable ya expression likhte hain.

      // Example 1

      let name4 = "Aakash";
      console.log(`Hello ${name4}`);

      // ES6 Default Parameter

      // Q1:-1

      function greet(name = "Guest") {
        return "Hello " + name;
      }

      console.log(greet("Aakash"));
      console.log(greet());

      //Q2 Multiply

      function multiply(a, b = 2) {
        return a * b;
      }
      console.log(multiply(10, 5));
      console.log(multiply(10));

      //Q3 Power

      function power(num = 3) {
        return num * num;
      }
      console.log(power(5));
      console.log(power());

      //Optional Chaining (?.)

      //Q1

      let user = {
        name: "Aakash",
      };
      console.log(user.address?.city);

      //Q2

      let student5 = {
        name: "Pawan",
        marks: {
          DM: 65,
        },
      };
      console.log(student5.marks?.DM);

      // Q3

      let car = {
        brand: "BMW",
      };
      console.log(car.model?.mod);

      //?? (Nullish Coalescing):- Ye operator default value dene ke liye use hota hai.

      let name3 = null;

      console.log(name3 ?? "Guest");


    </script>
  </body>
</html>
