<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ES6</title>
  </head>
  <body>
    <script>
      //Destructuring:- Object ya Array se values ko direct variables me nikalna.

      let student = {
        name: "Aakash",
        age: 24,
        city: "Delhi",
      };

      let { name, age, city } = student;

      console.log(name);
      console.log(age);
      console.log(city);
    </script>
  </body>
</html>
