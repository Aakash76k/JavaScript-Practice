<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ES6</title>
  </head>
  <body>
    <script>
      //Destructuring:- Object ya Array se values ko direct variables me nikalna.

      let student = {
        name: "Aakash",
        age: 24,
        city: "Delhi",
      };

      let { name, age, city } = student;

      console.log(name);
      console.log(age);
      console.log(city);

      //Q1. Name print karo

      let student1 = {
        name1: "Aakash",
        age: 24,
      };

      console.log(name);

      //Q2. Name aur Age print karo

      let s = {
        name2 : "Aakash",
        age2 : 23,
        city : "faridabad",
      };

      let {name2 , age2} = s;
      console.log(name2);
      console.log(age2);

      //Q3. Array Destructuring

      let ar = [10,20,30];
      let x ={
        a : ar[0],
        b: ar[1],
        c: ar[2],
      };
      let {a, b , c} = x;
      console.log(a);
      console.log(b);
      console.log(c);

      //Q4. First aur Second Fruit

      let fruits = ["Apple","Mango","Banana"];
      let n ={
        u : fruits[0],
        v: fruits[1],
        w: fruits[2],
      }
      let {u , v,w} = n;
      console.log(u);
      console.log(v);
      console.log(w);

      // Q5. Skip Value

      let numbers = [10,20,30,40];
      let  m = {
        a1: numbers[0],
        b1: numbers[1],
        c1: numbers[2],
        d1: numbers[3],
      };

      let {a1, c1} = m;
      console.log(a1);
      console.log(c1);




    </script>
  </body>
</html>
