<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>promise</title>
</head>
<body>
    <script>
        // Promise :- 🟡 Pending → Order ban raha hai., 🟢 Fulfilled → Order mil gaya. ,🔴 Rejected → Order cancel ho gaya.

        // Q1 Promise banao. and Resolve karo

        let promise = new Promise((resolve,reject)=>{
            let success = true;
            if(success){
                resolve(" Hello promise")
            }else{
                reject("no promise")
            }
        });

        promise 
        .then((data) =>{
            console.log(data);
        })
        .catch((err)=>{
            console.log(err);
        });

        // Q2 Promise banao and Reject karo

        let promise1 = new Promise((resolve, reject)=>{
            let a = false;
            if(a){
                resolve("something")
            }else{
                reject("something went wrong")
            }
        });

        promise1 
        .then((data)=>{
            console.log(data);
        })
        .catch((err)=>{
            console.log(err);
        });

        //Q3 id pass 

        
    </script>
</body>
</html>
